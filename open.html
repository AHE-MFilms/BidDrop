<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Opening estimate…</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(242,92,5,0.3);
      border-top-color: #F25C05;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; font-size: 15px; color: #aaa; }
    a { color: #F25C05; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Opening estimate page…</p>
  <a id="fallback" href="/" style="display:none">Tap here if it doesn't open</a>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var url = p.get('url');
      // Validate: only allow /e/ paths on same origin
      if (url && /^\/e\/[a-zA-Z0-9_-]+$/.test(url)) {
        // Use replace so back button doesn't return to this page
        window.location.replace(url);
      } else {
        // Fallback: go home
        window.location.replace('/');
      }
      // Show fallback link after 2 seconds in case redirect is slow
      setTimeout(function () {
        var link = document.getElementById('fallback');
        if (link) {
          link.href = url && /^\/e\/[a-zA-Z0-9_-]+$/.test(url) ? url : '/';
          link.style.display = 'block';
        }
      }, 2000);
    })();
  </script>
</body>
</html>
