  <div class="tab-pane" id="tab-territory" style="flex-direction:column;overflow-y:auto;padding:22px;gap:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--text);margin:0;">Territory Intel</h2>
        <p style="font-size:13px;color:var(--muted);margin:4px 0 0;">Storm events near your canvass zones — launch campaigns directly from damage reports.</p>
      </div>
      <button onclick="refreshTerritoryIntel()" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;">⟳ Refresh</button>
    </div>
    <!-- Stats strip -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;" id="ti-stats-strip">
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Hail Events</div>
        <div id="ti-stat-hail" style="font-size:26px;font-weight:900;color:#F59E0B;margin-top:4px;">—</div>
        <div style="font-size:11px;color:var(--muted);">past 30 days</div>
      </div>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Wind Events</div>
        <div id="ti-stat-wind" style="font-size:26px;font-weight:900;color:#34d399;margin-top:4px;">—</div>
        <div style="font-size:11px;color:var(--muted);">50+ MPH</div>
      </div>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Affected Counties</div>
        <div id="ti-stat-counties" style="font-size:26px;font-weight:900;color:#60a5fa;margin-top:4px;">—</div>
        <div style="font-size:11px;color:var(--muted);">unique areas</div>
      </div>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Campaigns Launched</div>
        <div id="ti-stat-launched" style="font-size:26px;font-weight:900;color:var(--accent);margin-top:4px;">—</div>
        <div style="font-size:11px;color:var(--muted);">from storm events</div>
      </div>
    </div>
    <!-- Filter bar -->
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <select id="ti-filter-type" onchange="renderTerritoryIntel()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;">
        <option value="all">All Events</option>
        <option value="hail">Hail Only</option>
        <option value="wind">Wind Only</option>
      </select>
      <select id="ti-filter-size" onchange="renderTerritoryIntel()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;">
        <option value="0">All Sizes</option>
        <option value="0.75">0.75"+ (Penny)</option>
        <option value="1.00">1.00"+ (Quarter)</option>
        <option value="1.50">1.50"+ (Golf Ball)</option>
        <option value="2.00">2.00"+ (Baseball)</option>
      </select>
      <input id="ti-filter-state" placeholder="Filter by state (e.g. MI)" onkeyup="renderTerritoryIntel()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;width:160px;" />
      <label style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="ti-group-county" onchange="renderTerritoryIntel()" checked style="accent-color:var(--accent);" /> Group by county
      </label>
    </div>
    <!-- Event list -->
    <div id="ti-event-list" style="display:flex;flex-direction:column;gap:10px;">
      <div style="text-align:center;padding:40px;color:var(--muted);font-size:14px;">
        Loading storm data… <span style="font-size:11px;">(uses the same data as the map Storm Events layer)</span>
      </div>
    </div>
  </div>

  <!-- SUBSCRIPTION TAB -->
