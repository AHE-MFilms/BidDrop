  <div class="tab-pane" id="tab-zones" style="flex-direction:row;overflow:hidden;">
    <!-- Sidebar -->
    <div style="width:280px;min-width:220px;max-width:320px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;">
      <div style="padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div style="font-family:var(--font-h);font-size:15px;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;gap:7px;">🗂 Canvass Areas<span id="zones-count" style="background:var(--accent);color:#fff;font-family:var(--font-m);font-size:10px;padding:2px 7px;border-radius:9px;display:none;"></span></div>
        <div style="display:flex;gap:6px;">
          <button id="btn-draw-zone" onclick="startDrawZone()" style="display:none;background:var(--accent);border:none;border-radius:7px;padding:7px 12px;color:#fff;font-family:var(--font-b);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">+ Draw Zone</button>
          <button id="btn-cancel-draw" onclick="cancelDrawZone()" style="display:none;background:var(--danger);border:none;border-radius:7px;padding:7px 12px;color:#fff;font-family:var(--font-b);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">✕ Cancel</button>
        </div>
      </div>
      <div id="zones-draw-tip" style="display:none;padding:8px 14px;background:var(--accent-dim);border-bottom:1px solid var(--border);font-size:11px;color:var(--accent);font-weight:600;">Click map corners to draw zone boundary. Double-click to finish.</div>
      <div id="zones-list" style="flex:1;overflow-y:auto;padding:8px;"></div>
    </div>
    <!-- Map -->
    <div style="flex:1;min-width:0;position:relative;overflow:hidden;">
      <!-- Address search overlay -->
      <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;width:320px;max-width:calc(100% - 80px);">
        <div style="display:flex;gap:0;position:relative;">
          <input id="zones-search-inp" class="map-search-inp" placeholder="🔍 Search address..." oninput="onZonesSearchInput()" onkeydown="if(event.key==='Enter')zonesSearchAddress()" style="flex:1;">
          <button class="map-search-btn" onclick="zonesSearchAddress()">→</button>
        </div>
        <div id="zones-search-results" class="map-search-results"></div>
      </div>
      <div id="zones-map" style="width:100%;height:100%;"></div>
      <!-- Slide-up pin detail card -->
      <div id="zone-pin-card" style="position:absolute;bottom:0;left:0;right:0;z-index:1001;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);background:var(--panel);border-top:2px solid var(--accent);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;">
          <div style="flex:1;min-width:0;">
            <div id="zpc-address" style="font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            <div id="zpc-meta" style="font-size:11px;color:var(--muted);margin-top:2px;"></div>
          </div>
          <button onclick="closeZonePinCard()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 0 0 12px;line-height:1;flex-shrink:0;">&times;</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:0 16px 14px;">
          <div id="zpc-photo" style="width:64px;height:64px;border-radius:8px;background:var(--card2);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:22px;">&#127968;</div>
          <div style="flex:1;min-width:0;">
            <div id="zpc-estimate" style="font-size:13px;font-weight:700;color:var(--success);margin-bottom:4px;"></div>
            <div id="zpc-rep" style="font-size:11px;color:var(--muted);margin-bottom:8px;"></div>
            <div style="display:flex;gap:8px;">
              <button id="zpc-open-btn" onclick="openZonePinEstimate()" style="background:var(--accent);border:none;border-radius:7px;padding:7px 16px;color:#fff;font-family:var(--font-h);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.4px;">&#128203; Open Estimate</button>
              <button onclick="closeZonePinCard()" style="background:none;border:1px solid var(--border);border-radius:7px;padding:7px 14px;color:var(--mid);font-family:var(--font-b);font-size:12px;cursor:pointer;">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- ADMIN TAB -->
