name: CI — Build + Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "staging"]

jobs:
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build (includes post-build validator)
        run: npm run build
        env:
          # Provide a placeholder anon key so the build env injection doesn't
          # fail in CI (the real key is only needed at runtime, not build time)
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-placeholder-key' }}

      - name: Check for unresolved partials in dist
        run: |
          if grep -q "@@PARTIAL:" dist/index.html; then
            echo "❌ Unresolved @@PARTIAL markers found in dist/index.html"
            grep "@@PARTIAL:" dist/index.html
            exit 1
          fi
          echo "✅ No unresolved partials"

      - name: Check onclick linkage
        run: node scripts/check-linkage.js

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
